  <body data-page="inscricao">

        </nav>
      </div>
    </header>

    <main class="page-main">
      <section class="section">
        <div class="container form-container">
          <h1>Inscrição para Peneira</h1>
          <p class="section-text">Preencha todos os campos obrigatórios para concluir sua inscrição.</p>

          <form id="inscricao-form" novalidate>
            <div class="form-grid">
              <label>
                Nome completo *
                <input type="text" name="nome" required />
              </label>

              <label>
                Idade *
                <input type="number" name="idade" min="5" max="60" required />
              </label>

              <label>
                Data de nascimento *
                <input type="date" name="nascimento" required />
              </label>

              <label>
                Posição que joga *
                <select name="posicao" required>
                  <option value="">Selecione</option>
                  <option value="Goleiro">Goleiro</option>
                  <option value="Fixo">Fixo</option>
                  <option value="Ala">Ala</option>
                  <option value="Pivô">Pivô</option>
                </select>
              </label>

              <label>
                Telefone
                <input type="tel" name="telefone" />
              </label>

              <label>
                E-mail *
                <input type="email" name="email" required />
              </label>

              <label>
                Cidade *
                <input type="text" name="cidade" required />
              </label>

              <fieldset class="radio-group">
                <legend>Já jogou em outro time?</legend>
                <label><input type="radio" name="outroTime" value="Sim" /> Sim</label>
                <label><input type="radio" name="outroTime" value="Não" /> Não</label>
              </fieldset>
            </div>

            <label>
              Observação
              <textarea name="observacao" rows="4" placeholder="Informações adicionais..."></textarea>
            </label>

            <button type="submit" class="btn btn-primary" id="submit-btn">
              <span class="btn-text">Enviar Inscrição</span>
              <span class="loader hidden" aria-hidden="true"></span>
            </button>

            <p id="form-message" class="form-message" role="alert" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>
